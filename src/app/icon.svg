<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#8B2020"/>
      <stop offset="100%" stop-color="#1E0505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C0392B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C0392B" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="100" height="100" rx="22" fill="url(#glow)"/>

  <!-- LEFT NOTE (lower pitch of tritone) -->
  <!-- Note head -->
  <ellipse cx="28" cy="68" rx="12" ry="8.5" fill="white" transform="rotate(-18 28 68)"/>
  <!-- Stem -->
  <rect x="38.5" y="22" width="4" height="48" rx="2" fill="white"/>

  <!-- RIGHT NOTE (upper pitch of tritone, augmented 4th higher) -->
  <!-- Note head -->
  <ellipse cx="62" cy="60" rx="12" ry="8.5" fill="white" transform="rotate(-18 62 60)"/>
  <!-- Stem -->
  <rect x="72.5" y="22" width="4" height="40" rx="2" fill="white"/>

  <!-- Beam connecting both stems (tritone beam) -->
  <path d="M38.5 22 L76.5 22 L76.5 28 L38.5 28 Z" fill="white" rx="2"/>

  <!-- Subtle augmented 4th mark — small sharp/cross above beam -->
  <g fill="white" opacity="0.55">
    <!-- ♯ symbol hint: two horizontal bars, two vertical bars -->
    <rect x="54" y="10" width="1.5" height="9" rx="0.7"/>
    <rect x="58" y="10" width="1.5" height="9" rx="0.7"/>
    <rect x="53" y="13" width="8" height="1.5" rx="0.7"/>
    <rect x="53" y="16.5" width="8" height="1.5" rx="0.7"/>
  </g>
</svg>
